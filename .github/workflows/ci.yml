name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The Jan/Apr 2026 incidents: rules deploys silently broke three features.
  # These tests pin down what the public can and can't do per database path.
  rules-tests:
    name: Firebase rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
        working-directory: tests
      - run: npm test
        working-directory: tests

  # Catches missing local assets (a broken og:image path shipped for months)
  links:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir "$GITHUB_WORKSPACE" --no-progress './*.html'
          fail: true
