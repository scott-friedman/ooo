# Cloudflare Worker configuration for Benefits API proxy
# Deploy with: npx wrangler deploy --config wrangler-benefits.toml

name = "benefits-api"
main = "benefits-proxy.js"
compatibility_date = "2024-01-01"

# After deploying, set secrets via:
# npx wrangler secret put GEMINI_API_KEY --config wrangler-benefits.toml
# npx wrangler secret put FIREBASE_SECRET --config wrangler-benefits.toml   (RTDB database secret — needed for cache writes)

[vars]
# Bump here when Google retires the model (gemini-2.0-flash died mid-2026)
GEMINI_MODEL = "gemini-2.5-flash"
