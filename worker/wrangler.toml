# Cloudflare Worker configuration for Home Assistant proxy
# Deploy with: npx wrangler deploy

name = "ha-command-center"
main = "ha-proxy.js"
compatibility_date = "2026-07-01"

# After deploying, set these secrets via:
# npx wrangler secret put HA_URL
# npx wrangler secret put HA_TOKEN
# npx wrangler secret put FIREBASE_SECRET   (RTDB database secret — needed for activity-log writes)

[vars]
# Non-secret variables can go here
# FIREBASE_URL can be here if you prefer (it's not secret)
FIREBASE_URL = "https://scottfriedman-f400d-default-rtdb.firebaseio.com"
