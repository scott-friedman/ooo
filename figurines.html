<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-097VQD41F8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-097VQD41F8');
    </script>
    <title>Figurine Playground - Scott Friedman</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Interactive 3D figurine playground - pet, feed, and play with virtual figurines">

    <!-- Open Graph -->
    <meta property="og:title" content="Figurine Playground - Scott Friedman">
    <meta property="og:description" content="Interactive 3D figurine playground - pet, feed, and play with virtual figurines">
    <meta property="og:image" content="https://scottfriedman.ooo/assets/og-image.png">
    <meta property="og:url" content="https://scottfriedman.ooo/figurines.html">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Figurine Playground - Scott Friedman">
    <meta name="twitter:description" content="Interactive 3D figurine playground - pet, feed, and play with virtual figurines">
    <meta name="twitter:image" content="https://scottfriedman.ooo/assets/og-image.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/figurines.css">
</head>
<body>
    <a href="#figurines-container" class="skip-link">Skip to main content</a>

    <!-- Status announcer for screen readers -->
    <div id="status-announcer" aria-live="polite" class="visually-hidden"></div>

    <!-- Collaborative drawing canvas -->
    <canvas id="whiteboard"></canvas>

    <!-- 3D Figurine Canvas -->
    <canvas id="figurine-canvas"></canvas>

    <!-- Mobile draw mode toggle -->
    <button class="mobile-draw-toggle" aria-label="Toggle draw mode">
        <span class="toggle-icon">✎</span>
    </button>

    <!-- Subtle drawing toolbar -->
    <div class="draw-toolbar" role="toolbar" aria-label="Drawing tools">
        <div class="toolbar-group sizes" role="group" aria-label="Brush sizes">
            <button class="size-btn" data-size="2" title="Fine" aria-label="Fine brush size" aria-pressed="false"><span></span></button>
            <button class="size-btn active" data-size="4" title="Medium" aria-label="Medium brush size" aria-pressed="true"><span></span></button>
            <button class="size-btn" data-size="8" title="Thick" aria-label="Thick brush size" aria-pressed="false"><span></span></button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group colors" role="group" aria-label="Colors">
            <button class="color-btn active" data-color="auto" title="Auto colors" aria-label="Auto color mode" aria-pressed="true">
                <span class="rainbow"></span>
            </button>
            <button class="color-btn" data-color="#2e7d54" title="Emerald" aria-label="Emerald color" aria-pressed="false"></button>
            <button class="color-btn" data-color="#428995" title="Ocean" aria-label="Ocean color" aria-pressed="false"></button>
            <button class="color-btn" data-color="#805f8a" title="Plum" aria-label="Plum color" aria-pressed="false"></button>
            <button class="color-btn" data-color="#b55d77" title="Berry" aria-label="Berry color" aria-pressed="false"></button>
            <button class="color-btn" data-color="#cc6644" title="Sunset" aria-label="Sunset color" aria-pressed="false"></button>
            <button class="color-btn" data-color="#c7a356" title="Gold" aria-label="Gold color" aria-pressed="false"></button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group tools" role="group" aria-label="Tools">
            <button class="tool-btn" data-tool="eraser" title="Eraser" aria-label="Eraser tool" aria-pressed="false">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0l5 5c.8.8.8 2 0 2.8L11 20"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Figurines Container -->
    <div id="figurines-container"></div>

    <!-- Particles Container (for hearts, food, zzz) -->
    <div id="particles-container"></div>

    <!-- Back to home link -->
    <a href="index.html" class="back-home" title="Back to home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
    </a>

    <!-- Add Figurine Button -->
    <button id="add-figurine-btn" class="add-figurine-btn" title="Add a figurine">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
    </button>

    <!-- Upload Modal -->
    <div id="upload-modal" class="upload-modal">
        <div class="upload-modal-content">
            <h2>Add New Figurine</h2>
            <button class="close-modal">&times;</button>

            <div class="upload-form">
                <div class="form-group">
                    <label for="figurine-name">Name</label>
                    <input type="text" id="figurine-name" placeholder="Enter figurine name" maxlength="20">
                </div>

                <div class="form-group">
                    <label>3D Model (.glb file)</label>
                    <div class="upload-dropzone" id="upload-dropzone">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p>Drag & drop .glb file here</p>
                        <p class="small">or click to browse</p>
                        <input type="file" id="model-file" accept=".glb,.gltf" hidden>
                    </div>
                    <div class="file-info" id="file-info" style="display: none;">
                        <span class="file-name"></span>
                        <button class="remove-file">&times;</button>
                    </div>
                </div>

                <div class="model-preview" id="model-preview">
                    <canvas id="preview-canvas"></canvas>
                    <p class="preview-placeholder">Model preview will appear here</p>
                </div>

                <div class="form-actions">
                    <button class="btn-cancel" id="cancel-upload">Cancel</button>
                    <button class="btn-submit" id="submit-figurine" disabled>Add Figurine</button>
                </div>
            </div>

            <div class="upload-help">
                <h4>How to get a 3D model:</h4>
                <ol>
                    <li>Go to <a href="https://meshy.ai" target="_blank">meshy.ai</a></li>
                    <li>Upload your figurine image</li>
                    <li>Wait for 3D generation (~2-5 min)</li>
                    <li>Download as .glb file</li>
                    <li>Upload here!</li>
                </ol>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/sanitize.js"></script>
    <script src="js/main.js"></script>
    <script src="js/figurines.js"></script>
</body>
</html>
