<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- Unlisted personal page: no analytics, no indexing, not in sitemap. -->
    <meta name="robots" content="noindex,nofollow">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#161616">
    <title>workouts</title>

    <!-- Add-to-home-screen / standalone PWA (item 12). The password-derived
         slug is never in the manifest — a standalone launch reads it from
         localStorage, or prompts for the password. -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="workouts">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/workouts.css">
</head>
<body class="workouts-page">
    <main class="workouts">
        <header class="page-header">
            <a class="back-link" href="index.html">← scottfriedman.ooo</a>
            <h1>workouts</h1>
            <p class="plan-meta" id="plan-meta"></p>
        </header>

        <div class="mode-toggle" role="group" aria-label="Workout location">
            <button type="button" data-mode="gym" aria-pressed="true">Gym</button>
            <button type="button" data-mode="home" aria-pressed="false">Home</button>
        </div>

        <div class="banner" id="banner" hidden></div>

        <section class="token-section" id="token-section" hidden>
            <p>Enter the password to load the plan.</p>
            <p class="token-error" id="token-message" hidden></p>
            <form id="token-form">
                <!-- Hidden username gives password managers a stable credential. -->
                <input type="text" name="username" value="workouts" autocomplete="username"
                       hidden aria-hidden="true" tabindex="-1">
                <input type="password" id="token-input" autocomplete="current-password"
                       autocapitalize="off" spellcheck="false" placeholder="password">
                <button type="submit">open</button>
            </form>
        </section>

        <div id="days"></div>

        <footer class="page-footer">
            <span id="fetched-at"></span>
            <a href="#" id="reset-token">forget password</a>
        </footer>
    </main>

    <script src="js/workouts.js"></script>
    <script src="js/workout-logger.js"></script>
    <script src="js/exercise-info.js"></script>
</body>
</html>
